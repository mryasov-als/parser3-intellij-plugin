<code><b>$cookie:fields</b>&nbsp;&nbsp;&nbsp;<span>
<br>
</code><span>
<br>
Такая конструкция возвращает <a href="hash.htm">хеш</a> со&nbsp;всеми </span><code><b>cookie</b></code><span>.
<br>

<br>
<b>Пример</b></span><span><b>
<br>
</b></span><code><span style="color:#7F97E1" class="blue"><b>^cookie:fields.</b></code></span><code><span style="color:#7F97E1" class="blue"><b><a href="hashforeach.htm">foreach</a></b></code></span><code><span style="color:#7F97E1" class="blue"><b>[name;value]{
<br>
</b></code></span><code><b>&nbsp;&nbsp;&nbsp;</b><span style="color:#7F97E1" class="blue"><b>$</b></code></span><code><span style="color:#7F97E1" class="blue"><b>name</b></code></span><code><b>&nbsp;-&nbsp;</b><span style="color:#7F97E1" class="blue"><b>^if($value&nbsp;is&nbsp;"hash"){$value.value}{$value}</b></code></span><code><b>
<br>
</b><span style="color:#7F97E1" class="blue"><b>}[</b></code></span><code><b>&lt;br&nbsp;/&gt;</b><span style="color:#7F97E1" class="blue"><b>]
<br>
</b></code></span><span>
<br>
Пример выведет на&nbsp;экран все доступные </span><code><b>cookie</b></code><span> и&nbsp;соответствующие им значения.
