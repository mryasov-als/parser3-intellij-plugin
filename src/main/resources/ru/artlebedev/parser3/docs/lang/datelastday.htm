<code><b>^date:last</b><b>-</b><b>day(год;месяц)</b><b>
<br>

<br>
</b><span>Метод возвращает последний день месяца указанного года и&nbsp;месяца.
<br>

<br>
<b>Пример</b></code><code><b>
<br>
</b><span style="color:#7F97E1" class="blue"><b>^date:last</b></code></span><code><span style="color:#7F97E1" class="blue"><b>-</b></code></span><code><span style="color:#7F97E1" class="blue"><b>day(2028;02)
<br>
</b></code></span><span>
<br>
Возвратит: </span><code><b>29</b></code><span>.
