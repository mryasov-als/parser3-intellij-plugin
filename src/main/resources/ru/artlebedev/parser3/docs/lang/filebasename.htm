<br>



<code><b>^file:basename[filespec]</b><span>
<br>

<br>
Из полного пути к&nbsp;файлу (</code><code><b>filespec</b></code><span>) метод получает имя файла с&nbsp;расширением имени, но&nbsp;без пути.
<br>

<br>
<b>Пример</b></span><span><b>
<br>
</b></span><code><span style="color:#7F97E1" class="blue"><b>^file:basename[</b></code></span><code><b>/a/some.tar.gz</b><span style="color:#7F97E1" class="blue"><b>]</b></code></span><code><b>
<br>
</b></code><span>
<br>
выдаст: </span><code><b>some.tar.gz</b></code><span>
<br>
</span></span>
