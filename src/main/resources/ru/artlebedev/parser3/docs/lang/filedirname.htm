<code><b>^file:dirname[filespec]</b><span>
<br>

<br>
Для переданного файла или каталога (</code><code><b>filespec</b></code><span>) метод возвращает каталог, в&nbsp;котором он находится.
<br>

<br>
<b>Пример</b></span><span><b>
<br>
</b></span><code><span style="color:#7F97E1" class="blue"><b>#имя&nbsp;файла
<br>
^file:dirname[</b></code></span><code><b>/a/some.tar.gz</b><span style="color:#7F97E1" class="blue"><b>]
<br>
#имя&nbsp;каталога…
<br>
^file:dirname[</b></code></span><code><b>/a/b/</b><span style="color:#7F97E1" class="blue"><b>]</b></code></span><code><b>
<br>
</b></code><span>
<br>
Оба вызова выдадут:
<br>
</span><code><b>/a
<br>
</b></code></span>
