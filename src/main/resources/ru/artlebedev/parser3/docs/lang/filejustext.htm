<code><b>^file:justext[filespec]</b><span>
<br>

<br>
Метод принимает в&nbsp;качестве параметра  полный путь к&nbsp;файлу (</code><code><b>filespec</b></code><span>) и&nbsp;возвращает раcширение имени файла без&nbsp;точки. 
<br>

<br>
<b>Пример</b></span><span><b>
<br>
</b></span><code><span style="color:#7F97E1" class="blue"><b>^file:justext[</b></code></span><code><b>/a/some.tar.gz</b><span style="color:#7F97E1" class="blue"><b>]</b></code></span><code><b>
<br>
</b></code><span>
<br>
выдаст: </span><code><b>gz</b></code><span>
