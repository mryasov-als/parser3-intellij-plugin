<code><b>^file:justname[filespec]</b><span>
<br>

<br>
Метод принимает в&nbsp;качестве параметра  полный путь к&nbsp;файлу и&nbsp;возвращает имя файла без&nbsp;пути и&nbsp;расширения.
<br>

<br>
<b>Пример</b></code><span><b>
<br>
</b></span><code><span style="color:#7F97E1" class="blue"><b>^file:justname[</b></code></span><code><b>/a/some.tar.gz</b><span style="color:#7F97E1" class="blue"><b>]</b></code></span><code><b>
<br>
</b></code><span>
<br>
выдаст: </span><code><b>some.tar</b></code><span>
<br>
</span></span>
