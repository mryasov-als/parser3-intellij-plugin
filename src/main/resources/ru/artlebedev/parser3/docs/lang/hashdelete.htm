<code><b>^хеш.delete[ключ]</b>
<br>
<b>^хеш.delete[]</b><b>&nbsp;&nbsp;&nbsp;</b><span><b><i>[3.</i></b><b><i>4</i></b><b><i>.4]</i></b></code><code>
<br>
</code><span>
<br>
Метод удаляет из&nbsp;хеша пару «</span><code><b>ключ&nbsp;/&nbsp;значение</b></code><span>». При вызове без&nbsp;параметра удаляются все поля хеша.
<br>

<br>
<b>Пример</b></span><span><b>
<br>
</b></span><code><span style="color:#7F97E1" class="blue"><b>^man.delete[name]</b></code></span><code><b>
<br>
</b></code><span>
<br>
Удалит ключ </span><code><b>name</b></code><span> и&nbsp;связанное с&nbsp;ним значение из&nbsp;хеша </span><code><b>man</b></code><span>.
<br>
</span></span>
