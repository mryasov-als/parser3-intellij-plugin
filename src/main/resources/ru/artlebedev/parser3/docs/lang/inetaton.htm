<br>



<code><b>^</b><b>inet</b><b>:</b><b>aton</b><b>[строка]
<br>

<br>
</b><span>Метод преобразует в&nbsp;число переданную строку с&nbsp;IP-адресом. Метод аналогичен функции </code><code><b>inet_aton</b></code><span> MySQL-сервера и&nbsp;Perl.</span><span>
<br>

<br>
</span><span><b>Пример
<br>
</b></span><code><span style="color:#7F97E1" class="blue"><b>^inet:</b></code></span><code><span style="color:#7F97E1" class="blue"><b>a</b></code></span><code><span style="color:#7F97E1" class="blue"><b>to</b></code></span><code><span style="color:#7F97E1" class="blue"><b>n</b></code></span><code><span style="color:#7F97E1" class="blue"><b>[</b></code></span><code><b>10.0.0.2</b><span style="color:#7F97E1" class="blue"><b>]</b></code></span><span>&nbsp;- получаем число </span><code><b>167772162</b></code><span>.
<br>
