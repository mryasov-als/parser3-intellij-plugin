<code><b>^</b><b>inet</b><b>:n</b><b>toa</b><b>(число</b><b>)
<br>
</b><span>
<br>
Метод преобразует в&nbsp;число переданную строку с&nbsp;IP-адресом. Метод аналогичен функции </code><code><b>inet_ntoa</b></code><span> MySQL-сервера и&nbsp;Perl.
<br>

<br>
<b>Пример
<br>
</b></span><code><span style="color:#7F97E1" class="blue"><b>^inet:ntoa(</b></code></span><code><b>167772162</b><span style="color:#7F97E1" class="blue"><b>)</b></code></span><span>&nbsp;- получаем строку </span><code><b>10.0.0.2</b></code><span>.
