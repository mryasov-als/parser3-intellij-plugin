<br>



<code><b>^math:sqrt(число)&nbsp;&nbsp;&nbsp;
<br>
</b><span>
<br>
Метод вычисляет квадратный корень </code><code><b>числа</b></code><span>.
<br>

<br>
<b>Пример
<br>
</b></span><code><span style="color:#7F97E1" class="blue"><b>^math:sqrt(16)</b></code></span><span>&nbsp;- получаем </span><code><b>4</b></code><span>.
<br>
</span><span>
<br>
</span><span><i>Примечание. Корень n-й&nbsp;степени вычисляется как возведение в&nbsp;степень 1/n.
<br>
</i></span></span>
