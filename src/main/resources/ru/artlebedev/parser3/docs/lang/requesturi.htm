<code><b>$request:uri</b><span><b>&nbsp;&nbsp;&nbsp;
<br>
</b></code><span>
<br>
Возвращает URI запрошенного документа.
<br>

<br>
<b>Пример
<br>
</b>Предположим, пользователь запросил такую страницу: 
<br>
</span><code>HTTP://www.mysite.ru/some%20news/articles.html?year=2000&amp;month=05&amp;day=27
<br>
</code><span>
<br>
Тогда:
<br>
</span><code><span style="color:#7F97E1" class="blue"><b>$request:uri</b></code></span><code><b>
<br>
</b></code><span>
<br>
вернет:
<br>
</span><code><b>/</b><b>some%20</b><b>news/articles.html?year=2000&amp;month=05&amp;day=27</b></code><span>
<br>
</span></span>
