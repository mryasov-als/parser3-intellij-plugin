<code><b>^строка.upper[]</b>&nbsp;&nbsp;&nbsp;
<br>
<b>^строка.lower[]</b>&nbsp;&nbsp;&nbsp;<span>
<br>
</code><span>
<br>

<br>

<br>

<br>
<b>Пример
<br>
</b></span><code><span style="color:#7F97E1" class="blue"><b>$str[</b></code></span><code><b>Москва</b><span style="color:#7F97E1" class="blue"><b>]</b></code></span><code><span style="color:#7F97E1" class="blue"><b>
<br>
^str.upper[]
<br>

<br>
</b></code></span><span>Вернет: </span><code><b>МОСКВА</b></code><span>.</span><span>
